# ── Audio ──────────────────────────────────────────────────────────
sample_rate: 24000
frame_rate: 12.5
channels: 1
clip_seconds: 12.0         # paper-equivalent — 12s clips
                           # transformer uses full 10s context window

# ── VAE Architecture ───────────────────────────────────────────────
encoder_base_channels: 64
encoder_strides: [6, 5, 4, 4, 4]     # total downsample = 1920 → 12.5Hz
latent_dim: 32
transformer_hidden: 512
transformer_layers: 8
transformer_heads: 8
transformer_ffn_dim: 2048
transformer_sliding_window: 125       # 10s × 12.5Hz = 125 frames (CALM Table 13)

# ── Training ───────────────────────────────────────────────────────
batch_size: 2                  # 2 × 12s = 24s per micro-step
grad_accumulation: 32          # effective batch = 64 — matches paper exactly
learning_rate: 8.0e-4
disc_learning_rate: 3.0e-4
betas: [0.5, 0.9]              # Moshi paper
transformer_weight_decay: 0.05
ema_decay: 0.99
lr_schedule: cosine
max_steps: 500000
warmup_steps: 5000
grad_clip_norm: 1000.0

# ── Loss weights ───────────────────────────────────────────────────
lambda_kl: 0.01
lambda_adv: 1.0
lambda_feat: 5.0
lambda_distil: 25.0
lambda_recon: 0.0             

# ── WavLM ──────────────────────────────────────────────────────────
wavlm_model: "microsoft/wavlm-large"
wavlm_input_sr: 16000

# ── Checkpointing ──────────────────────────────────────────────────
save_every: 2000              
eval_every: 1000
keep_last_n: 5
output_dir: "/datadrive/edward/checkpoints/speech_vae"

# ── Data — English only, local paths ───────────────────────────────
libritts_root: "/datadrive/data/libri_tts/LibriTTS/train-clean-360"
spicor_root:   "/datadrive/data/spicor/IISc_SPICOR_Data"
